<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brad Kunisaki — Product Leader</title>
<meta name="description" content="Product Leader with 12+ years building mission-critical software and AI products for defense, logistics, and government customers.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
/* ── Reset & Design Tokens ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2F5FA;
  --surface:#FFFFFF;
  --border:#D8E2F0;
  --border-sub:#E6EDF8;
  --tx:#111827;
  --tx2:#4B5563;
  --tx3:#9CA3AF;
  --navy:#1B3461;
  --navy-mid:#2952A3;
  --navy-light:#EBF0FA;
  --navy-dim:#7B9DD4;
  --navy-bright:#3A6BC4;
  --fd:'Lora',Georgia,serif;
  --fb:'DM Sans',system-ui,sans-serif;
  --r:6px;
  --rl:12px;
  --ease:200ms cubic-bezier(.4,0,.2,1);
  --sh:0 1px 4px rgba(27,52,97,.07);
  --sh-md:0 4px 20px rgba(27,52,97,.11);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}

/* ── Header ── */
.hd{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.hd-in{max-width:920px;margin:0 auto;padding:0 24px;height:62px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.av{width:36px;height:36px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:13px;font-weight:600;flex-shrink:0;letter-spacing:.02em}
.bn{font-family:var(--fd);font-size:16px;font-weight:600;letter-spacing:-.01em;color:var(--tx)}
.tabs{display:flex;gap:2px}
.tb{background:none;border:none;cursor:pointer;font-family:var(--fb);font-size:13.5px;font-weight:500;color:var(--tx2);padding:6px 14px;border-radius:var(--r);transition:color var(--ease),background var(--ease);position:relative;letter-spacing:.01em}
.tb:hover{color:var(--tx);background:var(--navy-light)}
.tb.on{color:var(--navy);background:var(--navy-light);font-weight:600}
.tb.on::after{content:'';position:absolute;bottom:-1px;left:14px;right:14px;height:2px;background:var(--navy);border-radius:2px 2px 0 0}

/* ── Main wrapper ── */
.main{max-width:920px;margin:0 auto;padding:44px 24px 100px;width:100%}
.panel{animation:tabIn .22s ease}
@keyframes tabIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.section{margin-bottom:66px}
.sl{font-size:10.5px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--tx3);margin-bottom:22px;display:flex;align-items:center;gap:12px}
.sl::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Hero ── */
.hero{margin-bottom:52px;padding-bottom:52px;border-bottom:1px solid var(--border)}
.hero-ey{font-size:11.5px;font-weight:600;color:var(--navy-mid);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:9px}
.hero-ey::before{content:'';width:20px;height:2px;background:var(--navy-mid);border-radius:2px;display:inline-block;flex-shrink:0}
.hero-name{font-family:var(--fd);font-size:clamp(34px,5vw,52px);font-weight:600;line-height:1.1;letter-spacing:-.025em;margin-bottom:18px;color:var(--tx)}
.hero-tag{font-size:17px;color:var(--tx2);max-width:560px;line-height:1.6;font-weight:300}

/* ── Collapsible Career Timeline ── */
.tl-outer{position:relative}
.tl-spine{position:absolute;left:15px;top:16px;bottom:16px;width:2px;background:linear-gradient(to bottom,var(--navy-light) 0%,var(--border) 40%,var(--border) 60%,var(--navy-light) 100%);border-radius:2px;z-index:0}
.tl-item{display:grid;grid-template-columns:32px 1fr;gap:0;margin-bottom:10px;position:relative}
.tl-dot-col{display:flex;justify-content:center;padding-top:18px;z-index:1}
.tl-dot{width:12px;height:12px;border-radius:50%;border:2.5px solid var(--bg);flex-shrink:0;cursor:pointer;transition:transform var(--ease),box-shadow var(--ease)}
.tl-dot:hover{transform:scale(1.25);box-shadow:0 0 0 4px rgba(27,52,97,.13)}
.tl-dot.dp{background:var(--navy)}
.tl-dot.dt{background:var(--navy-bright)}
.tl-dot.de{background:var(--tx3)}
.tl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);margin-left:14px;overflow:hidden;transition:box-shadow var(--ease),border-color var(--ease);box-shadow:var(--sh)}
.tl-card:hover{box-shadow:var(--sh-md);border-color:var(--navy-dim)}
.tl-summary{padding:14px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;user-select:none}
.tl-left{flex:1;min-width:0}
.tl-role{font-size:14px;font-weight:600;color:var(--tx);line-height:1.25}
.tl-meta{font-size:11.5px;color:var(--tx3);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
.tl-co{color:var(--navy-mid);font-weight:500}
.tl-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.tl-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:100px;white-space:nowrap;letter-spacing:.04em}
.tl-badge.dp{background:var(--navy-light);color:var(--navy)}
.tl-badge.dt{background:#EFF6FF;color:#1D4ED8}
.tl-badge.de{background:#F3F4F6;color:#4B5563}
.tl-chevron{color:var(--tx3);font-size:15px;transition:transform var(--ease),color var(--ease);flex-shrink:0}
.tl-chevron.open{transform:rotate(180deg);color:var(--navy)}
.tl-detail{border-top:1px solid var(--border-sub);padding:14px 18px 16px;animation:slideDown .18s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.tl-ms{list-style:none;display:flex;flex-direction:column;gap:5px}
.tl-ms li{font-size:13px;color:var(--tx2);padding-left:15px;position:relative;line-height:1.5}
.tl-ms li::before{content:'·';position:absolute;left:4px;color:var(--navy-dim);font-size:18px;line-height:1.1}
.tl-ip-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--navy);background:var(--navy-light);padding:3px 10px;border-radius:100px;margin-top:10px;cursor:pointer;border:none;font-family:var(--fb);transition:background var(--ease),color var(--ease)}
.tl-ip-btn:hover{background:var(--navy);color:#fff}
/* Timeline legend */
.tl-legend{display:flex;gap:18px;margin-bottom:18px;flex-wrap:wrap}
.tl-legend-item{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--tx3)}
.tl-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── Inflection Points ── */
.ip-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(262px,1fr));gap:14px}
.ip-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:22px;position:relative;overflow:hidden;transition:box-shadow var(--ease);box-shadow:var(--sh)}
.ip-card:hover{box-shadow:var(--sh-md)}
.ip-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--navy),var(--navy-bright))}
.ip-yr{font-size:10.5px;font-weight:600;color:var(--navy-mid);letter-spacing:.09em;text-transform:uppercase;margin-bottom:7px}
.ip-title{font-family:var(--fd);font-size:16px;font-weight:600;line-height:1.3;margin-bottom:10px;color:var(--tx)}
.ip-ctx{font-size:13px;color:var(--tx2);line-height:1.65;margin-bottom:12px}
.ip-why{font-size:12.5px;color:var(--tx2);line-height:1.55;padding-top:12px;border-top:1px solid var(--border-sub);font-style:italic}
.ip-why strong{font-style:normal;font-weight:600;color:var(--tx);font-size:10px;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px}

/* ── Case Studies ── */
.cs-grid{display:flex;flex-direction:column;gap:13px}
.cs-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;transition:box-shadow var(--ease),border-color var(--ease);box-shadow:var(--sh)}
.cs-card:hover{box-shadow:var(--sh-md);border-color:var(--navy-dim)}
.cs-hd{padding:22px 26px;cursor:pointer;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:start;user-select:none}
.cs-meta{display:flex;align-items:center;gap:9px;margin-bottom:7px;flex-wrap:wrap}
.cs-tag{font-size:10.5px;font-weight:600;letter-spacing:.06em;color:var(--navy);background:var(--navy-light);padding:2px 9px;border-radius:100px;white-space:nowrap}
.cs-co{font-size:11.5px;color:var(--tx3)}
.cs-title{font-family:var(--fd);font-size:18px;font-weight:600;letter-spacing:-.01em;line-height:1.3;color:var(--tx)}
.cs-right{display:flex;align-items:flex-start;gap:12px;flex-shrink:0}
.cs-stat{text-align:right}
.cs-sv{font-family:var(--fd);font-size:20px;font-weight:600;color:var(--navy);line-height:1.1}
.cs-sl{font-size:10.5px;color:var(--tx2);max-width:140px;text-align:right;margin-top:3px;line-height:1.35}
.cs-icon{align-self:center;color:var(--tx3);font-size:16px;transition:transform var(--ease);flex-shrink:0}
.cs-icon.open{transform:rotate(180deg);color:var(--navy)}
/* BUG FIX: added padding-top so text doesn't butt against the divider */
.cs-body{padding:18px 26px 26px;border-top:1px solid var(--border-sub);animation:slideDown .18s ease}
.cs-sec{padding:14px 0;border-bottom:1px solid var(--border-sub)}
.cs-sec:last-child{border-bottom:none;padding-bottom:0}
.cs-lbl{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--navy-mid);margin-bottom:7px}
.cs-txt{font-size:14px;line-height:1.72;color:var(--tx2)}
.cs-ul{list-style:none;display:flex;flex-direction:column;gap:5px}
.cs-ul li{font-size:14px;color:var(--tx2);padding-left:15px;position:relative;line-height:1.5}
.cs-ul li::before{content:'→';position:absolute;left:0;color:var(--navy-dim);font-size:11px;top:3px}
.cs-hard{background:var(--navy-light);border-left:3px solid var(--navy-dim);border-radius:0 var(--r) var(--r) 0;padding:14px 16px;font-size:13.5px;color:var(--tx2);line-height:1.65;font-style:italic}

/* ── Skills ── */
.sk-layout{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-bottom:60px}
.sk-t{font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);margin-bottom:12px}
.sk-list{display:flex;flex-direction:column;gap:5px}
.sk-item{display:flex;align-items:center;justify-content:space-between;font-size:13.5px;color:var(--tx2);padding:7px 10px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);transition:border-color var(--ease),color var(--ease);box-shadow:var(--sh)}
.sk-item:hover{border-color:var(--navy-dim);color:var(--tx)}
.sk-lnk{font-size:10px;font-weight:600;color:var(--navy);background:var(--navy-light);padding:2px 7px;border-radius:100px;cursor:pointer;border:none;font-family:var(--fb);white-space:nowrap;transition:background var(--ease),color var(--ease);flex-shrink:0}
.sk-lnk:hover{background:var(--navy);color:#fff}

/* ── Principles ── */
.pr-list{display:flex;flex-direction:column}
.pr-item{padding:22px 0;border-bottom:1px solid var(--border-sub);display:grid;grid-template-columns:1fr auto;gap:22px;align-items:start}
.pr-item:last-child{border-bottom:none}
.pr-title{font-family:var(--fd);font-size:16px;font-weight:600;margin-bottom:7px;line-height:1.3;color:var(--tx)}
.pr-body{font-size:14px;color:var(--tx2);line-height:1.72;max-width:580px}
.pr-num{font-family:var(--fd);font-size:30px;font-weight:600;color:var(--border);line-height:1;user-select:none;padding-top:4px}

/* ── Related CS drawer (skills tab) ── */
/* BUG FIX: removed negative margin-top that caused overlap issues */
.related-cs{margin-bottom:66px;animation:slideDown .2s ease}
.dismiss-btn{background:none;border:none;cursor:pointer;font-size:12.5px;color:var(--tx3);font-family:var(--fb);padding:0;transition:color var(--ease);margin-left:auto}
.dismiss-btn:hover{color:var(--tx)}
/* Make the dismiss sit inline with the section label */
.sl-row{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.sl-row .sl{margin-bottom:0;flex:1}
.sl-row .sl::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Background ── */
.bg-sec{margin-bottom:44px}
.bg-t{font-family:var(--fd);font-size:19px;font-weight:600;margin-bottom:16px;color:var(--tx)}
/* BUG FIX: consistent wrapping so year never overlaps text on narrow screens */
.bg-item{display:flex;justify-content:space-between;align-items:baseline;padding:12px 0;border-bottom:1px solid var(--border-sub);gap:16px}
.bg-item:last-child{border-bottom:none}
.bg-item-text{flex:1;min-width:0}
.bg-in{font-size:14px;font-weight:500;color:var(--tx)}
.bg-sub{font-size:12.5px;color:var(--tx2);margin-top:1px}
.bg-yr{font-size:12px;color:var(--tx3);white-space:nowrap;flex-shrink:0}

/* ── Contact ── */
.ct-layout{display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:start}
.ct-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:26px;box-shadow:var(--sh)}
.ct-hd{font-family:var(--fd);font-size:19px;font-weight:600;margin-bottom:18px;color:var(--tx)}
.ct-link{display:flex;align-items:center;gap:11px;font-size:14px;font-weight:500;color:var(--tx);text-decoration:none;padding:11px 0;border-bottom:1px solid var(--border-sub);transition:color var(--ease)}
.ct-link:last-child{border-bottom:none}
.ct-link:hover{color:var(--navy)}
.ct-icon{width:32px;height:32px;border-radius:var(--r);background:var(--navy-light);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;color:var(--navy);font-weight:600}
.lk-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.lk-list li{font-size:13.5px;color:var(--tx2);padding-left:16px;position:relative;line-height:1.5}
.lk-list li::before{content:'→';position:absolute;left:0;color:var(--navy);font-size:12px;top:3px}
.ct-note{background:var(--navy-light);border-left:3px solid var(--navy);border-radius:0 var(--r) var(--r) 0;padding:18px 22px;font-size:14px;line-height:1.75;color:var(--tx2);font-style:italic;margin-top:22px}

/* ── Mobile ── */
@media(max-width:680px){
  .hd-in{padding:0 16px}
  .main{padding:28px 16px 80px}
  .tb{padding:5px 9px;font-size:12.5px}
  .sk-layout{grid-template-columns:1fr}
  .ct-layout{grid-template-columns:1fr}
  .ip-grid{grid-template-columns:1fr}
  .cs-hd{grid-template-columns:1fr}
  .cs-right{margin-top:4px}
  .cs-stat{text-align:left}
  .cs-sl{text-align:left;max-width:100%}
  .hero{margin-bottom:36px;padding-bottom:36px}
  .section{margin-bottom:48px}
  .pr-item{grid-template-columns:1fr}
  .pr-num{display:none}
  .tl-right{gap:6px}
  .tl-badge{display:none}
}
@media(max-width:420px){
  .tabs{gap:0}
  .tb{padding:5px 7px;font-size:12px}
  .hero-name{font-size:30px}
  .bn{font-size:14px}
}
</style>
</head>

</header>

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let currentTab = 'work';
let openCS = { cs1:true, cs2:false, cs3:false };
let openTL = {};
let activeSkillStudy = null;

// ═══════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════
function getIPMap() {
  const m = {};
  DATA.inflectionPoints.forEach(ip => { m[ip.id] = ip; });
  return m;
}

// BUG FIX: all interactive functions declared on window so inline onclick
// handlers in dynamically-injected HTML can always find them
window.scrollToEl = function(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
};

window.toggleTL = function(id) {
  openTL[id] = !openTL[id];
  const card = document.getElementById('tlcard-' + id);
  if (!card) return;
  const chevron = card.querySelector('.tl-chevron');
  const existing = document.getElementById('tldetail-' + id);
  const item = DATA.timeline.find(t => t.id === id);
  if (!item) return;
  const ip = item.ip ? getIPMap()[item.ip] : null;

  if (openTL[id]) {
    if (chevron) chevron.classList.add('open');
    if (!existing) {
      const det = document.createElement('div');
      det.className = 'tl-detail';
      det.id = 'tldetail-' + id;
      det.innerHTML =
        '<ul class="tl-ms">' + item.ms.map(m => '<li>' + m + '</li>').join('') + '</ul>' +
        (ip ? '<button class="tl-ip-btn" onclick="scrollToEl(\'ip-' + ip.id + '\')">✦ ' + ip.title + '</button>' : '');
      card.appendChild(det);
    }
  } else {
    if (chevron) chevron.classList.remove('open');
    if (existing) existing.remove();
  }
};

window.toggleCS = function(id) {
  openCS[id] = !openCS[id];
  const cs = DATA.caseStudies.find(c => c.id === id);
  if (!cs) return;
  const card = document.getElementById('cs-' + id);
  if (!card) return;
  const icon = card.querySelector('.cs-icon');
  const existing = card.querySelector('.cs-body');

  if (openCS[id]) {
    if (icon) icon.classList.add('open');
    if (!existing) {
      const body = document.createElement('div');
      body.className = 'cs-body';
      body.innerHTML =
        '<div class="cs-sec"><div class="cs-lbl">Problem</div><div class="cs-txt">' + cs.problem + '</div></div>' +
        '<div class="cs-sec"><div class="cs-lbl">Approach</div><div class="cs-txt">' + cs.approach + '</div></div>' +
        '<div class="cs-sec"><div class="cs-lbl">Key Contributions</div><ul class="cs-ul">' +
          cs.contributions.map(c => '<li>' + c + '</li>').join('') +
        '</ul></div>' +
        '<div class="cs-sec"><div class="cs-lbl">Outcomes</div><div class="cs-txt">' + cs.outcomes + '</div></div>' +
        '<div class="cs-sec"><div class="cs-lbl">What Was Hard</div><div class="cs-hard">' + cs.hard + '</div></div>';
      card.appendChild(body);
    }
  } else {
    if (icon) icon.classList.remove('open');
    if (existing) existing.remove();
  }
};

window.showSkillStudy = function(id) {
  activeSkillStudy = id;
  showTab('skills');
  // Give DOM time to render before scrolling
  setTimeout(() => {
    const el = document.getElementById('related-cs-section');
    if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  }, 60);
};

window.dismissSkillStudy = function() {
  activeSkillStudy = null;
  showTab('skills');
};

function buildTimeline() {
  const ips = getIPMap();
  const badgeLabel = { dp:'Product', dt:'Test Lead', de:'Engineering / Design' };

  const legend = `
    <div class="tl-legend">
      <div class="tl-legend-item"><div class="tl-legend-dot" style="background:var(--navy)"></div>Product</div>
      <div class="tl-legend-item"><div class="tl-legend-dot" style="background:var(--navy-bright)"></div>Test Lead</div>
      <div class="tl-legend-item"><div class="tl-legend-dot" style="background:var(--tx3)"></div>Engineering / Design</div>
    </div>`;

  const items = DATA.timeline.map(item => {
    const isOpen = !!openTL[item.id];
    const ip = item.ip ? ips[item.ip] : null;
    return `
    <div class="tl-item">
      <div class="tl-dot-col">
        <div class="tl-dot ${item.type}" title="${item.role}" onclick="toggleTL('${item.id}')"></div>
      </div>
      <div class="tl-card" id="tlcard-${item.id}">
        <div class="tl-summary" onclick="toggleTL('${item.id}')">
          <div class="tl-left">
            <div class="tl-role">${item.role}</div>
            <div class="tl-meta">
              <span class="tl-co">${item.company}</span>
              <span>${item.period}</span>
              <span>${item.loc}</span>
            </div>
          </div>
          <div class="tl-right">
            <span class="tl-badge ${item.type}">${badgeLabel[item.type]}</span>
            <span class="tl-chevron${isOpen ? ' open' : ''}">▾</span>
          </div>
        </div>
        ${isOpen ? `
        <div class="tl-detail" id="tldetail-${item.id}">
          <ul class="tl-ms">${item.ms.map(m => '<li>' + m + '</li>').join('')}</ul>
          ${ip ? `<button class="tl-ip-btn" onclick="scrollToEl('ip-${ip.id}')">✦ ${ip.title}</button>` : ''}
        </div>` : ''}
      </div>
    </div>`;
  }).join('');

  return `<div class="tl-outer">${legend}<div class="tl-spine"></div>${items}</div>`;
}

function buildCaseStudyCard(cs, forceOpen) {
  const isOpen = forceOpen !== undefined ? forceOpen : !!openCS[cs.id];
  return `
  <div class="cs-card" id="cs-${cs.id}">
    <div class="cs-hd" onclick="toggleCS('${cs.id}')">
      <div>
        <div class="cs-meta">
          <span class="cs-tag">${cs.tag}</span>
          <span class="cs-co">${cs.company} · ${cs.period}</span>
        </div>
        <div class="cs-title">${cs.title}</div>
      </div>
      <div class="cs-right">
        <div class="cs-stat">
          <div class="cs-sv">${cs.stat.v}</div>
          <div class="cs-sl">${cs.stat.l}</div>
        </div>
        <span class="cs-icon${isOpen ? ' open' : ''}">▾</span>
      </div>
    </div>
    ${isOpen ? `
    <div class="cs-body">
      <div class="cs-sec"><div class="cs-lbl">Problem</div><div class="cs-txt">${cs.problem}</div></div>
      <div class="cs-sec"><div class="cs-lbl">Approach</div><div class="cs-txt">${cs.approach}</div></div>
      <div class="cs-sec"><div class="cs-lbl">Key Contributions</div><ul class="cs-ul">${cs.contributions.map(c => '<li>' + c + '</li>').join('')}</ul></div>
      <div class="cs-sec"><div class="cs-lbl">Outcomes</div><div class="cs-txt">${cs.outcomes}</div></div>
      <div class="cs-sec"><div class="cs-lbl">What Was Hard</div><div class="cs-hard">${cs.hard}</div></div>
    </div>` : ''}
  </div>`;
}

function buildInflectionPoints() {
  return `<div class="ip-grid">
    ${DATA.inflectionPoints.map(ip => `
    <div class="ip-card" id="ip-${ip.id}">
      <div class="ip-yr">${ip.period}</div>

      <div class="ip-ctx">${ip.ctx}</div>
      <div class="ip-why"><strong>Why It Mattered</strong>${ip.why}</div>
    </div>`).join('')}

function buildSkillGroup(title, skills) {
  return `<div>
    <div class="sk-t">${title}</div>

      ${skills.map(s => `
      <div class="sk-item">
        <span>${s.n}</span>
        ${s.s ? `<button class="sk-lnk" onclick="showSkillStudy('${s.s}')">case study →</button>` : ''}
      </div>`).join('')}
    </div>
  </div>`;
}

// ═══════════════════════════════════════
// TAB RENDERERS

// ═══════════════════════════════════════
// ROUTING
// ═══════════════════════════════════════
const renderers = {
  work: renderWork,
  skills: renderSkills,
  background: renderBackground,
  contact: renderContact
};

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tb').forEach(b => b.classList.toggle('on', b.dataset.tab === tab));
  document.getElementById('main').innerHTML = renderers[tab]();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Tab nav clicks
document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tb');
  if (btn && btn.dataset.tab) {
    // BUG FIX: clear activeSkillStudy when leaving skills tab
    if (btn.dataset.tab !== 'skills') activeSkillStudy = null;
    showTab(btn.dataset.tab);
  }
});

// BUG FIX: brand logo also clears activeSkillStudy before navigating to work
document.getElementById('brand-logo').addEventListener('click', () => {
  activeSkillStudy = null;
  showTab('work');
});

// Initial render
showTab('work');
